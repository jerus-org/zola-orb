version: 2.1

orbs:
  # Your orb will be automatically injected here during the pipeline.
  # Reference your orb's jobs and commands below as they will exist when built.
  orb-tools: circleci/orb-tools@12.4.0
  # The orb definition is intentionally not included here. It will be injected into the pipeline.
  zola-orb: {}
  toolkit: jerus-org/circleci-toolkit@6.1.0

# Use this tag to ensure test jobs always run,
# even though the downstream publish job will only run on release tags.
filters: &filters
  tags:
    only: /.*/

# Filter for release tags.
release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  # Create jobs to test the commands of your orbs.
  # You may want to add additional validation steps to ensure the commands are working as expected.
  command-test:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      # Run your orb's commands to validate them.

workflows:
  test-deploy:
    jobs:
      - command-test:
          filters: *filters

      # The orb must be re-packed for publishing, and saved to the workspace.
      - orb-tools/pack:
          filters: *release-filters

      # Generate MCP server binary and attach to the GitHub release.
      - toolkit/build_mcp_server:
          name: generate-mcp-server
          orb_name: zola-orb
          binary_name: zola_orb_mcp
          version: << pipeline.git.tag >>
          release_tag: << pipeline.git.tag >>
          prime_history: true
          prime_earliest_version: "1.0.0"
          context:
            - bot-check
            - release
            - pcu-app
          requires:
            - command-test
          filters: *release-filters

      - orb-tools/publish:
          orb_name: jerus-org/zola
          vcs_type: << pipeline.project.type >>
          pub_type: production
          requires:
            - orb-tools/pack
            - command-test
          context: orb-publishing
          filters: *release-filters
